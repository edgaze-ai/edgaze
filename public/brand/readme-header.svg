<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color"
          values="#22d3ee;#818cf8;#c084fc;#22d3ee"
          dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#818cf8">
        <animate attributeName="stop-color"
          values="#818cf8;#c084fc;#22d3ee;#818cf8"
          dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c084fc">
        <animate attributeName="stop-color"
          values="#c084fc;#22d3ee;#818cf8;#c084fc"
          dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="gradLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#22d3ee">
        <animate attributeName="stop-color"
          values="#22d3ee;#818cf8;#c084fc;#22d3ee"
          dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text
    x="430" y="118"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="92"
    font-weight="800"
    letter-spacing="18"
    fill="url(#grad)"
    filter="url(#glow)"
  >EDGAZE</text>

  <!-- Tagline -->
  <text
    x="430" y="158"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="6"
    fill="rgba(255,255,255,0.38)"
    filter="url(#subtleglow)"
  >CREATE · SELL · DISTRIBUTE</text>

  <!-- Divider line -->
  <line x1="230" y1="176" x2="630" y2="176"
    stroke="url(#gradLine)"
    stroke-width="1"
    opacity="0.7"/>
</svg>
