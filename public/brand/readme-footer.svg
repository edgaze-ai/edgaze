<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#c084fc;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#c084fc;#22d3ee;#818cf8" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#22d3ee;#818cf8;#c084fc" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="fl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#c084fc;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="fglow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top gradient line -->
  <line x1="220" y1="22" x2="540" y2="22" stroke="url(#fl)" stroke-width="1" opacity="0.7"/>

  <!-- Edgaze name -->
  <text x="380" y="80" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="46" font-weight="800" letter-spacing="14"
    fill="url(#fg)" filter="url(#fglow)">EDGAZE</text>

  <!-- Tagline -->
  <text x="380" y="108" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="400" letter-spacing="5"
    fill="rgba(150,150,150,0.65)">CREATE  ·  SELL  ·  DISTRIBUTE</text>

  <!-- Mid gradient line -->
  <line x1="290" y1="124" x2="470" y2="124" stroke="url(#fl)" stroke-width="1" opacity="0.5"/>

  <!-- Footer note -->
  <text x="380" y="148" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" font-weight="400" letter-spacing="1"
    fill="rgba(120,120,120,0.45)">Proprietary · Edge Platforms, Inc. · All Rights Reserved</text>
</svg>
