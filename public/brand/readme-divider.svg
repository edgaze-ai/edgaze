<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 100" width="760" height="100">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#c084fc;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#c084fc;#22d3ee;#818cf8" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#22d3ee;#818cf8;#c084fc" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#c084fc;#22d3ee;#818cf8" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#818cf8;#c084fc;#22d3ee" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="sglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Separator lines -->
  <line x1="60" y1="18" x2="700" y2="18" stroke="url(#dl)" stroke-width="1" opacity="0.55"/>
  <line x1="60" y1="82" x2="700" y2="82" stroke="url(#dl)" stroke-width="1" opacity="0.55"/>

  <!-- Prompt Studio label -->
  <text x="128" y="56" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="3"
    fill="url(#dg)" filter="url(#sglow)">PROMPT STUDIO</text>

  <!-- Workflow Builder label -->
  <text x="380" y="56" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="3"
    fill="url(#dg)" filter="url(#sglow)">WORKFLOW BUILDER</text>

  <!-- Marketplace label -->
  <text x="632" y="56" text-anchor="middle"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="3"
    fill="url(#dg)" filter="url(#sglow)">MARKETPLACE</text>

  <!-- Pulsing separator dots -->
  <circle cx="254" cy="50" r="2.5" fill="url(#dg)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="506" cy="50" r="2.5" fill="url(#dg)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" begin="0.73s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="2.2s" begin="0.73s" repeatCount="indefinite"/>
  </circle>
</svg>
